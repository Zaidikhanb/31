<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Zaid – All Data</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login Overlay -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 2L30 16L16 30L2 16L16 2Z" fill="url(#logoGrad)" stroke="white" stroke-width="1.5"/>
          <defs>
            <linearGradient id="logoGrad" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
              <stop stop-color="#a855f7"/>
              <stop offset="1" stop-color="#22d3ee"/>
            </linearGradient>
          </defs>
        </svg>
        Unit Zaid
      </div>
      <h3>Unlock</h3>
      <form id="loginForm">
        <div class="form-group">
          <input type="text" id="loginUser" placeholder="Username" required>
        </div>
        <div class="form-group">
          <input type="password" id="loginPass" placeholder="Password" required>
        </div>
        <button type="submit" class="btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Enter
        </button>
        <p class="login-error" id="loginError"></p>
      </form>
    </div>
  </div>

  <!-- Main Content (hidden until login) -->
  <div id="mainContent" style="display:none;">
    <nav class="navbar">
      <div class="logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 2L30 16L16 30L2 16L16 2Z" fill="url(#logoGrad)" stroke="white" stroke-width="1.5"/>
          <defs>
            <linearGradient id="logoGrad" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
              <stop stop-color="#a855f7"/>
              <stop offset="1" stop-color="#22d3ee"/>
            </linearGradient>
          </defs>
        </svg>
        DataVault
      </div>
      <div class="nav-links">
        <a href="index.html">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Data Entry
        </a>
        <a href="view.html" class="active">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          View Data
        </a>
        <button class="logout-btn" id="logoutBtn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </nav>

    <div class="filter-bar glass-card" style="margin-bottom: 28px;">
      <select id="periodFilter">
        <option value="all">All Time</option>
        <option value="daily">Today</option>
        <option value="weekly">This Week</option>
        <option value="monthly">This Month</option>
        <option value="yearly">This Year</option>
      </select>
      <button class="btn" id="downloadAllBtn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download All
      </button>
    </div>

    <div id="sectionsContainer"></div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="auth.js"></script>
  <script src="view.js"></script>
</body>
</html>
